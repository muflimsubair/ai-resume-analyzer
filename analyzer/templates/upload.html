<!DOCTYPE html>
<html>
<head>
    <title>Analyze Resume</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(to right, #ff416c, #0072ff);
        }

        .fade-in {
            animation: fadeIn 1s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px);}
            to { opacity: 1; transform: translateY(0);}
        }
    </style>
</head>

<body>

<div class="container mt-5 fade-in">
    <div class="card p-4 shadow-lg">

        <h2 class="text-center mb-4">📄 Resume Analyzer</h2>

        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}

            <input type="text" name="name" class="form-control mb-3" placeholder="Your name">

            <input type="file" name="resume" class="form-control mb-3">

            <textarea name="job_description" class="form-control mb-3" rows="6"
                      placeholder="Paste job description here"></textarea>

            <button type="submit" class="btn btn-primary w-100">
                🚀 Analyze Resume
            </button>
        </form>

        <!-- LOADING SPINNER -->
        <div id="loading" style="display:none; text-align:center; margin-top:20px;">
            <div class="spinner-border text-primary"></div>
            <p class="mt-2">Analyzing your resume...</p>
        </div>

    </div>
</div>

<script>
document.querySelector("form").addEventListener("submit", function() {
    document.getElementById("loading").style.display = "block";
});
</script>

</body>
</html>
